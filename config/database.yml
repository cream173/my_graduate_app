default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST") { "localhost" } %>
  username: <%= ENV.fetch("DATABASE_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "password" } %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: my_graduate_app_development

test:
  <<: *default
  database: my_graduate_app_test

production:
  <<: *default
  database: my_graduate_app_production
  username: my_graduate_app
  password: <%= ENV["MY_GRADUATE_APP_DATABASE_PASSWORD"] %>